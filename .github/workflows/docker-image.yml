name: Docker Image CI

on:
#   push:
#     branches: [ "master" ]
#   pull_request:
#     branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Native Image Container for ${{ matrix.target }}
    strategy:
      max-parallel: 2
      matrix:
        target: [azure, grafana]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get image tag
        id: get-image-tag
        run: |
          IMAGE_TAG1=${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}:${{ matrix.target }}
          echo "tag1=$IMAGE_TAG1" >> $GITHUB_OUTPUT
          IMAGE_TAG2=${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}:${{ matrix.target }}-$(date +%s)
          echo "tag2=$IMAGE_TAG2" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: Dockerfile.${{ matrix.target }}
          ulimit: nofile=5000:5000
          tags: |
            ${{ steps.get-image-tag.outputs.tag1 }}
            ${{ steps.get-image-tag.outputs.tag2 }}
